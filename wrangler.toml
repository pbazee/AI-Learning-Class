name = "ai-genius-lab"
account_id = "00d89852dbf5409a64da20ac12fe3920"
keep_vars = true

main = ".open-next/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
run_worker_first = false

[vars]
NEXT_PUBLIC_APP_URL = "https://ai-genius-lab.daviswapeti.workers.dev"
CLOUDFLARE_WORKERS = "true"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "ai-genius-lab-assets"

[build]
command = "npx @opennextjs/cloudflare build"
